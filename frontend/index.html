<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legend Barbershop</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="phone">
    <div id="app"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/imagePicker.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/reviews.js"></script>
  <script src="js/stats.js"></script>

  <script src="js/menu.js"></script>
  <script src="js/clientProfile.js"></script>
  <script src="js/loyalty.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/historyPro.js"></script>

  <script src="js/screens.js"></script>
  <script src="js/admin.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        await home();
      } catch (e) {
        console.error(e);
        document.getElementById("app").innerHTML = `
          <div class="screen">
            <h2>Ошибка запуска</h2>
            <p class="muted">Открой консоль браузера или проверь подключение файлов.</p>
            <button class="gold-btn" onclick="location.reload()">Обновить</button>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
